<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>森林生态学刷题</title>
  <style>
    :root {
      color-scheme: light;
      --page: #f5f7f1;
      --surface: #ffffff;
      --surface-2: #eef4ef;
      --ink: #1f2b27;
      --muted: #5d6964;
      --line: #d7ded6;
      --green: #2f7d5c;
      --teal: #197681;
      --amber: #c87926;
      --red: #b6494b;
      --shadow: 0 16px 42px rgba(28, 42, 36, 0.11);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      background: var(--page);
      color: var(--ink);
      font-family: Inter, "Segoe UI", Arial, "Microsoft YaHei", sans-serif;
      line-height: 1.5;
    }

    button,
    select,
    input {
      font: inherit;
    }

    button {
      border: 0;
    }

    figure {
      margin: 0;
    }

    .page {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 48px;
    }

    .masthead {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(300px, 0.75fr);
      gap: 28px;
      align-items: stretch;
      min-height: 220px;
      padding: 20px 0 26px;
      border-bottom: 1px solid var(--line);
    }

    .title-block {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 14px;
      min-width: 0;
    }

    .eyebrow {
      color: var(--teal);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      max-width: 760px;
      font-size: clamp(2rem, 4vw, 4.2rem);
      line-height: 1.03;
      letter-spacing: 0;
    }

    .lead {
      max-width: 680px;
      margin: 0;
      color: var(--muted);
      font-size: 1.02rem;
      overflow-wrap: anywhere;
    }

    .forest-panel {
      min-height: 210px;
      min-width: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #dfeadf;
      box-shadow: var(--shadow);
    }

    .forest-panel svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      background: rgba(245, 247, 241, 0.94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .toolbar-actions,
    .review-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .button {
      display: inline-flex;
      min-height: 40px;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      border-radius: 8px;
      background: var(--ink);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
      transition: transform 140ms ease, background 140ms ease, box-shadow 140ms ease;
    }

    .button svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(31, 43, 39, 0.16);
    }

    .button.secondary {
      background: var(--surface);
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .button.submit {
      background: var(--green);
    }

    .button:focus-visible,
    .choice input:focus-visible + span,
    select:focus-visible {
      outline: 3px solid rgba(25, 118, 129, 0.28);
      outline-offset: 3px;
    }

    .counter {
      display: grid;
      gap: 2px;
      min-width: 160px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .counter strong {
      color: var(--ink);
      font-size: 1.1rem;
    }

    select {
      min-height: 40px;
      padding: 0 34px 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
    }

    .score-panel {
      display: none;
      margin: 22px 0 4px;
      padding: 18px;
      border: 1px solid var(--line);
      border-left: 5px solid var(--green);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .score-panel.is-visible {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
    }

    .score-main {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: baseline;
    }

    .score-value {
      font-size: 2.3rem;
      line-height: 1;
      font-weight: 800;
    }

    .score-note {
      color: var(--muted);
      margin: 4px 0 0;
    }

    .quiz-form {
      display: grid;
      gap: 14px;
      margin-top: 20px;
    }

    .question-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 10px 28px rgba(28, 42, 36, 0.07);
      overflow: hidden;
    }

    .question-card.is-correct {
      border-left: 5px solid var(--green);
    }

    .question-card.is-wrong,
    .question-card.is-unanswered {
      border-left: 5px solid var(--red);
    }

    .question-head {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr);
      gap: 12px;
      padding: 18px 18px 10px;
      align-items: start;
    }

    .question-no {
      display: inline-grid;
      width: 38px;
      height: 38px;
      place-items: center;
      border-radius: 50%;
      background: var(--surface-2);
      color: var(--green);
      font-weight: 800;
    }

    .question-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.83rem;
    }

    .question-title {
      margin: 0;
      font-size: 1.02rem;
      font-weight: 760;
      overflow-wrap: anywhere;
    }

    .choices {
      display: grid;
      gap: 8px;
      padding: 8px 18px 18px 74px;
    }

    .choice {
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      padding: 10px 12px;
      border: 1px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      transition: background 120ms ease, border-color 120ms ease;
    }

    .choice:hover {
      background: #f4f8f6;
      border-color: var(--line);
    }

    .choice input {
      width: 18px;
      height: 18px;
      margin: 2px 0 0;
      accent-color: var(--green);
    }

    .choice-letter {
      font-weight: 800;
      color: var(--teal);
      margin-right: 6px;
    }

    .choice span,
    .answer-line {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .choice.is-selected {
      background: #edf7f1;
      border-color: rgba(47, 125, 92, 0.35);
    }

    .choice.is-answer {
      background: #eaf6ed;
      border-color: rgba(47, 125, 92, 0.55);
    }

    .choice.is-missed,
    .choice.is-picked-wrong {
      background: #fff0ef;
      border-color: rgba(182, 73, 75, 0.42);
    }

    .answer-line {
      display: none;
      margin: 0 18px 18px 74px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #fbf4e8;
      color: #6a421d;
      font-size: 0.92rem;
    }

    .question-card.is-reviewed .answer-line {
      display: block;
    }

    .empty-state {
      padding: 30px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      text-align: center;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 840px) {
      .page {
        width: min(100% - 20px, 720px);
        padding-top: 12px;
      }

      .masthead {
        grid-template-columns: 1fr;
        gap: 18px;
        min-height: auto;
      }

      .forest-panel {
        min-height: 150px;
      }

      .toolbar {
        position: static;
        align-items: flex-start;
        flex-direction: column;
      }

      .counter {
        min-width: 0;
      }

      .score-panel.is-visible {
        grid-template-columns: 1fr;
      }

      .question-head {
        grid-template-columns: 36px minmax(0, 1fr);
        padding: 16px 14px 8px;
      }

      .question-no {
        width: 32px;
        height: 32px;
      }

      .choices {
        padding: 8px 14px 16px 14px;
      }

      .answer-line {
        margin: 0 14px 16px 14px;
      }
    }
  </style>
</head>

  </script>
  <script>
    const QUESTION_BANK = JSON.parse(document.getElementById("question-bank").textContent);
    const QUIZ_SIZE = 20;
    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const state = {
      quiz: [],
      selected: {},
      submitted: false,
      filter: "all"
    };

    const quizForm = document.getElementById("quiz-form");
    const scorePanel = document.getElementById("score-panel");
    const answeredCount = document.getElementById("answered-count");
    const reviewFilter = document.getElementById("review-filter");
    const liveStatus = document.getElementById("live-status");

    function shuffle(items) {
      const copy = [...items];
      for (let index = copy.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [copy[index], copy[swapIndex]] = [copy[swapIndex], copy[index]];
      }
      return copy;
    }

    function sameSet(first, second) {
      if (first.length !== second.length) return false;
      const left = [...first].sort((a, b) => a - b);
      const right = [...second].sort((a, b) => a - b);
      return left.every((value, index) => value === right[index]);
    }

    function getSelected(questionId) {
      return state.selected[questionId] || [];
    }

    function isAnswered(question) {
      return getSelected(question.id).length > 0;
    }

    function isCorrect(question) {
      return sameSet(getSelected(question.id), question.answer_indices);
    }

    function answerText(question) {
      return question.answer_indices
        .map((index) => `${letters[index]}. ${question.choices[index]}`)
        .join("；");
    }

    function updateAnsweredCount() {
      const answered = state.quiz.filter(isAnswered).length;
      answeredCount.textContent = `${answered}/${state.quiz.length}`;
    }

    function questionShouldShow(question) {
      if (!state.submitted || state.filter === "all") return true;
      if (state.filter === "wrong") return !isCorrect(question);
      if (state.filter === "unanswered") return !isAnswered(question);
      return true;
    }

    function renderScore() {
      if (!state.submitted) {
        scorePanel.className = "score-panel";
        scorePanel.innerHTML = "";
        return;
      }

      const correct = state.quiz.filter(isCorrect).length;
      const unanswered = state.quiz.filter((question) => !isAnswered(question)).length;
      const percent = Math.round((correct / state.quiz.length) * 100);
      const wrong = state.quiz.length - correct;

      scorePanel.className = "score-panel is-visible";
      scorePanel.innerHTML = `
        <div>
          <div class="score-main">
            <span class="score-value">${correct}/${state.quiz.length}</span>
            <strong>${percent} 分</strong>
          </div>
          <p class="score-note">错题 ${wrong} 道，未答 ${unanswered} 道。页面已标出正确答案。</p>
        </div>
        <button class="button secondary" type="button" id="again-from-score" title="重新随机抽题">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v6h-6"/></svg>再来一组
        </button>
      `;
      document.getElementById("again-from-score").addEventListener("click", startQuiz);
    }

    function renderQuiz() {
      updateAnsweredCount();
      renderScore();

      const visibleQuestions = state.quiz.filter(questionShouldShow);
      if (!visibleQuestions.length) {
        quizForm.innerHTML = '<div class="empty-state">当前筛选下没有题目。</div>';
        return;
      }

      quizForm.innerHTML = visibleQuestions.map((question) => renderQuestion(question)).join("");
    }

    function renderQuestion(question) {
      const quizNumber = state.quiz.indexOf(question) + 1;
      const selected = getSelected(question.id);
      const reviewedClass = state.submitted ? " is-reviewed" : "";
      const statusClass = state.submitted
        ? isCorrect(question)
          ? " is-correct"
          : isAnswered(question)
            ? " is-wrong"
            : " is-unanswered"
        : "";
      const inputType = question.answer_indices.length > 1 ? "checkbox" : "radio";
      const choiceMarkup = question.choices.map((choice, index) => {
        const checked = selected.includes(index) ? " checked" : "";
        const disabled = state.submitted ? " disabled" : "";
        const pickedWrong = state.submitted && selected.includes(index) && !question.answer_indices.includes(index);
        const missed = state.submitted && !selected.includes(index) && question.answer_indices.includes(index);
        const answer = state.submitted && question.answer_indices.includes(index);
        const classes = [
          "choice",
          selected.includes(index) ? "is-selected" : "",
          answer ? "is-answer" : "",
          pickedWrong ? "is-picked-wrong" : "",
          missed ? "is-missed" : ""
        ].filter(Boolean).join(" ");

        return `
          <label class="${classes}">
            <input type="${inputType}" name="${question.id}" value="${index}" data-question-id="${question.id}"${checked}${disabled}>
            <span><span class="choice-letter">${letters[index]}.</span>${escapeHtml(choice)}</span>
          </label>
        `;
      }).join("");

      return `
        <article class="question-card${statusClass}${reviewedClass}" data-question-id="${question.id}">
          <div class="question-head">
            <span class="question-no">${quizNumber}</span>
            <div>
              <h2 class="question-title">${escapeHtml(question.stem)}</h2>
              <div class="question-meta">${escapeHtml(question.unit || "Question Bank")}</div>
            </div>
          </div>
          <div class="choices">${choiceMarkup}</div>
          <p class="answer-line"><strong>正确答案：</strong>${escapeHtml(answerText(question))}</p>
        </article>
      `;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function handleChoiceChange(event) {
      const input = event.target;
      if (!input.matches("input[data-question-id]")) return;

      const questionId = input.dataset.questionId;
      const value = Number(input.value);
      const question = state.quiz.find((item) => item.id === questionId);

      if (question.answer_indices.length > 1) {
        const current = new Set(getSelected(questionId));
        if (input.checked) {
          current.add(value);
        } else {
          current.delete(value);
        }
        state.selected[questionId] = [...current];
      } else {
        state.selected[questionId] = [value];
      }

      renderQuiz();
    }

    function submitQuiz() {
      state.submitted = true;
      state.filter = "all";
      reviewFilter.value = "all";
      renderQuiz();
      const correct = state.quiz.filter(isCorrect).length;
      liveStatus.textContent = `已判分，答对 ${correct} 道。`;
      scorePanel.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function resetAnswers() {
      state.selected = {};
      state.submitted = false;
      state.filter = "all";
      reviewFilter.value = "all";
      renderQuiz();
      liveStatus.textContent = "当前选择已清空。";
    }

    function startQuiz() {
      state.quiz = shuffle(QUESTION_BANK).slice(0, QUIZ_SIZE);
      state.selected = {};
      state.submitted = false;
      state.filter = "all";
      reviewFilter.value = "all";
      renderQuiz();
      liveStatus.textContent = "已随机抽取新题组。";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    quizForm.addEventListener("change", handleChoiceChange);
    document.getElementById("new-quiz").addEventListener("click", startQuiz);
    document.getElementById("submit-quiz").addEventListener("click", submitQuiz);
    document.getElementById("reset-answers").addEventListener("click", resetAnswers);
    reviewFilter.addEventListener("change", (event) => {
      state.filter = event.target.value;
      renderQuiz();
    });

    startQuiz();
  </script>
