<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>森林生态学刷题</title>
  <style>
    :root {
      color-scheme: light;
      --page: #f5f7f1;
      --surface: #ffffff;
      --surface-2: #eef4ef;
      --ink: #1f2b27;
      --muted: #5d6964;
      --line: #d7ded6;
      --green: #2f7d5c;
      --teal: #197681;
      --amber: #c87926;
      --red: #b6494b;
      --shadow: 0 16px 42px rgba(28, 42, 36, 0.11);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      background: var(--page);
      color: var(--ink);
      font-family: Inter, "Segoe UI", Arial, "Microsoft YaHei", sans-serif;
      line-height: 1.5;
    }

    button,
    select,
    input {
      font: inherit;
    }

    button {
      border: 0;
    }

    figure {
      margin: 0;
    }

    .page {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 48px;
    }

    .masthead {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(300px, 0.75fr);
      gap: 28px;
      align-items: stretch;
      min-height: 220px;
      padding: 20px 0 26px;
      border-bottom: 1px solid var(--line);
    }

    .title-block {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 14px;
      min-width: 0;
    }

    .eyebrow {
      color: var(--teal);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      max-width: 760px;
      font-size: clamp(2rem, 4vw, 4.2rem);
      line-height: 1.03;
      letter-spacing: 0;
    }

    .lead {
      max-width: 680px;
      margin: 0;
      color: var(--muted);
      font-size: 1.02rem;
      overflow-wrap: anywhere;
    }

    .forest-panel {
      min-height: 210px;
      min-width: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #dfeadf;
      box-shadow: var(--shadow);
    }

    .forest-panel svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      background: rgba(245, 247, 241, 0.94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .mode-tabs {
      display: inline-flex;
      flex-wrap: wrap;
      min-height: 40px;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
    }

    .mode-tab {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 32px;
      padding: 0 12px;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-weight: 750;
    }

    .mode-tab svg {
      width: 17px;
      height: 17px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .mode-tab.is-active {
      background: var(--green);
      color: #fff;
    }

    .toolbar-actions,
    .review-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      min-width: 0;
      max-width: 100%;
    }

    .button {
      display: inline-flex;
      min-height: 40px;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      border-radius: 8px;
      background: var(--ink);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
      transition: transform 140ms ease, background 140ms ease, box-shadow 140ms ease;
    }

    .button svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(31, 43, 39, 0.16);
    }

    .button.secondary {
      background: var(--surface);
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .button.submit {
      background: var(--green);
    }

    .button:focus-visible,
    .choice input:focus-visible + span,
    .translation-input:focus-visible,
    select:focus-visible {
      outline: 3px solid rgba(25, 118, 129, 0.28);
      outline-offset: 3px;
    }

    .counter {
      display: grid;
      gap: 2px;
      min-width: 160px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .counter strong {
      color: var(--ink);
      font-size: 1.1rem;
    }

    .mistake-stat {
      display: inline-flex;
      min-height: 40px;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-2);
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .mistake-stat strong {
      color: var(--green);
    }

    select {
      min-height: 40px;
      padding: 0 34px 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
    }

    .score-panel {
      display: none;
      margin: 22px 0 4px;
      padding: 18px;
      border: 1px solid var(--line);
      border-left: 5px solid var(--green);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .score-panel.is-visible {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
    }

    .score-main {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: baseline;
    }

    .score-value {
      font-size: 2.3rem;
      line-height: 1;
      font-weight: 800;
    }

    .score-note {
      color: var(--muted);
      margin: 4px 0 0;
    }

    .quiz-form {
      display: grid;
      gap: 14px;
      margin-top: 20px;
    }

    .bottom-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 26px 0 0;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 10px 28px rgba(28, 42, 36, 0.07);
    }

    .question-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 10px 28px rgba(28, 42, 36, 0.07);
      overflow: hidden;
    }

    .question-card.is-correct {
      border-left: 5px solid var(--green);
    }

    .question-card.is-wrong,
    .question-card.is-unanswered {
      border-left: 5px solid var(--red);
    }

    .question-head {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr);
      gap: 12px;
      padding: 18px 18px 10px;
      align-items: start;
    }

    .question-no {
      display: inline-grid;
      width: 38px;
      height: 38px;
      place-items: center;
      border-radius: 50%;
      background: var(--surface-2);
      color: var(--green);
      font-weight: 800;
    }

    .question-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.83rem;
    }

    .mistake-badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      margin-left: 8px;
      padding: 0 8px;
      border-radius: 999px;
      background: #eaf6ed;
      color: var(--green);
      font-weight: 800;
    }

    .question-title {
      margin: 0;
      font-size: 1.02rem;
      font-weight: 760;
      overflow-wrap: anywhere;
    }

    .choices {
      display: grid;
      gap: 8px;
      padding: 8px 18px 18px 74px;
    }

    .term-answer-box {
      display: grid;
      gap: 8px;
      padding: 8px 18px 18px 74px;
    }

    .translation-input {
      width: 100%;
      min-height: 46px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfdfb;
      color: var(--ink);
      overflow-wrap: anywhere;
    }

    .translation-input::placeholder {
      color: #88938e;
    }

    .translation-input:disabled {
      background: #f4f8f6;
      color: var(--ink);
      opacity: 1;
    }

    .translation-input.is-correct {
      border-color: rgba(47, 125, 92, 0.6);
      background: #edf7f1;
    }

    .translation-input.is-wrong {
      border-color: rgba(200, 121, 38, 0.48);
      background: #fff6e8;
    }

    .choice {
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      padding: 10px 12px;
      border: 1px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      transition: background 120ms ease, border-color 120ms ease;
    }

    .choice:hover {
      background: #f4f8f6;
      border-color: var(--line);
    }

    .choice input {
      width: 18px;
      height: 18px;
      margin: 2px 0 0;
      accent-color: var(--green);
    }

    .choice-letter {
      font-weight: 800;
      color: var(--teal);
      margin-right: 6px;
    }

    .choice span,
    .answer-line {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .choice.is-selected {
      background: #edf7f1;
      border-color: rgba(47, 125, 92, 0.35);
    }

    .choice.is-answer {
      background: #eaf6ed;
      border-color: rgba(47, 125, 92, 0.55);
    }

    .choice.is-missed {
      background: #eaf6ed;
      border-color: rgba(47, 125, 92, 0.55);
    }

    .choice.is-picked-wrong {
      background: #fff6e8;
      border-color: rgba(200, 121, 38, 0.42);
    }

    .answer-line {
      display: none;
      margin: 0 18px 18px 74px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #eaf6ed;
      color: #245f48;
      font-size: 0.92rem;
    }

    .question-card.is-reviewed .answer-line {
      display: block;
    }

    .empty-state {
      padding: 30px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      text-align: center;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 840px) {
      .page {
        width: min(100% - 20px, 720px);
        padding-top: 12px;
      }

      .masthead {
        grid-template-columns: 1fr;
        gap: 18px;
        min-height: auto;
      }

      .forest-panel {
        min-height: 150px;
      }

      .toolbar {
        position: static;
        align-items: flex-start;
        flex-direction: column;
      }

      .toolbar-actions,
      .review-tools {
        width: 100%;
      }

      .mode-tabs {
        width: 100%;
      }

      .mode-tab {
        flex: 1 1 calc(50% - 3px);
        justify-content: center;
      }

      #clear-mistakes {
        flex-basis: 100%;
        justify-content: center;
      }

      .counter {
        min-width: 0;
      }

      .score-panel.is-visible {
        grid-template-columns: 1fr;
      }

      .question-head {
        grid-template-columns: 36px minmax(0, 1fr);
        padding: 16px 14px 8px;
      }

      .question-no {
        width: 32px;
        height: 32px;
      }

      .choices {
        padding: 8px 14px 16px 14px;
      }

      .term-answer-box {
        padding: 8px 14px 16px 14px;
      }

      .bottom-actions {
        padding: 14px;
      }

      .bottom-actions .button {
        flex: 1 1 150px;
        justify-content: center;
      }

      .answer-line {
        margin: 0 14px 16px 14px;
      }
    }
  </style>
</head>

  </script>
  <script>
    const QUESTION_BANK = JSON.parse(document.getElementById("question-bank").textContent);
    const TERM_BANK = JSON.parse(document.getElementById("term-bank").textContent);
    const QUIZ_SIZE = 20;
    const TERM_QUIZ_SIZE = 10;
    const STORAGE_KEY = "forestEcologyMistakeBook.v1";
    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const state = {
      quiz: [],
      selected: {},
      typed: {},
      submitted: false,
      filter: "all",
      mode: "practice",
      mistakeBook: loadMistakeBook()
    };

    const quizForm = document.getElementById("quiz-form");
    const scorePanel = document.getElementById("score-panel");
    const answeredCount = document.getElementById("answered-count");
    const reviewFilter = document.getElementById("review-filter");
    const liveStatus = document.getElementById("live-status");
    const modePracticeButton = document.getElementById("mode-practice");
    const modeMistakesButton = document.getElementById("mode-mistakes");
    const modeEnZhButton = document.getElementById("mode-en-zh");
    const modeZhEnButton = document.getElementById("mode-zh-en");
    const mistakeCount = document.getElementById("mistake-count");
    const clearMistakesButton = document.getElementById("clear-mistakes");

    function wrongCountFor(entry) {
      if (!entry) return 0;
      const count = Number(entry.wrongCount);
      return Number.isFinite(count) && count > 0 ? Math.floor(count) : 1;
    }

    function nextWrongCount(existing) {
      return wrongCountFor(existing) + 1;
    }

    function loadMistakeBook() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return {};
        const parsed = JSON.parse(saved);
        if (!parsed || typeof parsed !== "object") return {};

        return Object.entries(parsed).reduce((book, [key, entry]) => {
          if (!entry || typeof entry !== "object") return book;
          const id = entry.id || key;
          book[id] = {
            ...entry,
            id,
            wrongCount: wrongCountFor(entry)
          };
          return book;
        }, {});
      } catch (error) {
        return {};
      }
    }

    function saveMistakeBook() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state.mistakeBook));
      } catch (error) {
        liveStatus.textContent = "浏览器未能保存错题本，但当前页面仍可继续使用。";
      }
    }

    function getMistakeEntry(questionId) {
      const entry = state.mistakeBook[questionId] || null;
      if (!entry) return null;
      entry.wrongCount = wrongCountFor(entry);
      return entry;
    }

    function getMistakeQuestions() {
      return Object.values(state.mistakeBook)
        .map((entry) => QUESTION_BANK.find((question) => question.id === entry.id))
        .filter(Boolean)
        .sort((first, second) => {
          const firstEntry = state.mistakeBook[first.id];
          const secondEntry = state.mistakeBook[second.id];
          const firstWrongCount = wrongCountFor(firstEntry);
          const secondWrongCount = wrongCountFor(secondEntry);
          if (secondWrongCount !== firstWrongCount) {
            return secondWrongCount - firstWrongCount;
          }
          return String(secondEntry.lastWrongAt || "").localeCompare(String(firstEntry.lastWrongAt || ""));
        });
    }

    function updateMistakeCount() {
      const count = Object.keys(state.mistakeBook).length;
      mistakeCount.textContent = String(count);
      clearMistakesButton.disabled = count === 0;
    }

    function shuffle(items) {
      const copy = [...items];
      for (let index = copy.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [copy[index], copy[swapIndex]] = [copy[swapIndex], copy[index]];
      }
      return copy;
    }

    function sameSet(first, second) {
      if (first.length !== second.length) return false;
      const left = [...first].sort((a, b) => a - b);
      const right = [...second].sort((a, b) => a - b);
      return left.every((value, index) => value === right[index]);
    }

    function getSelected(questionId) {
      return state.selected[questionId] || [];
    }

    function getTyped(questionId) {
      return state.typed[questionId] || "";
    }

    function isTermMode(mode = state.mode) {
      return mode === "en-zh" || mode === "zh-en";
    }

    function normalizeTermAnswer(value) {
      return String(value)
        .toLowerCase()
        .replace(/[’']/g, "")
        .replace(/[（）()]/g, "")
        .replace(/[\s,，.。;；:：/\-—–_·]/g, "")
        .trim();
    }

    function isTermCorrect(question) {
      const typed = normalizeTermAnswer(getTyped(question.id));
      const answer = normalizeTermAnswer(question.answer);
      if (!typed || !answer) return false;
      if (typed === answer) return true;
      return typed.length >= 2 && answer.length >= 2 && (answer.includes(typed) || typed.includes(answer));
    }

    function isAnswered(question) {
      if (question.type === "term") {
        return getTyped(question.id).trim().length > 0;
      }
      return getSelected(question.id).length > 0;
    }

    function isCorrect(question) {
      if (question.type === "term") {
        return isTermCorrect(question);
      }
      return sameSet(getSelected(question.id), question.answer_indices);
    }

    function answerText(question) {
      if (question.type === "term") {
        return question.answer;
      }
      return question.answer_indices
        .map((index) => `${letters[index]}. ${question.choices[index]}`)
        .join("；");
    }

    function updateAnsweredCount() {
      const answered = state.quiz.filter(isAnswered).length;
      answeredCount.textContent = `${answered}/${state.quiz.length}`;
    }

    function questionShouldShow(question) {
      if (!state.submitted || state.filter === "all") return true;
      if (state.filter === "wrong") return !isCorrect(question);
      if (state.filter === "unanswered") return !isAnswered(question);
      return true;
    }

    function recordMistakes() {
      const now = new Date().toISOString();
      state.quiz.forEach((question) => {
        if (question.type === "term") return;

        const selected = getSelected(question.id);
        const existing = state.mistakeBook[question.id];

        if (!isCorrect(question)) {
          state.mistakeBook[question.id] = {
            id: question.id,
            stem: question.stem,
            unit: question.unit,
            answer_indices: question.answer_indices,
            answer_letters: question.answer_letters,
            wrongCount: nextWrongCount(existing),
            lastSelected: selected,
            lastWrongAt: now
          };
        } else if (existing) {
          state.mistakeBook[question.id] = {
            ...existing,
            lastSelected: selected,
            lastCorrectAt: now
          };
        }
      });
      saveMistakeBook();
      updateMistakeCount();
    }

    function setModeButtons() {
      const modeButtons = [
        [modePracticeButton, "practice"],
        [modeMistakesButton, "mistakes"],
        [modeEnZhButton, "en-zh"],
        [modeZhEnButton, "zh-en"]
      ];

      modeButtons.forEach(([button, mode]) => {
        const active = state.mode === mode;
        button.classList.toggle("is-active", active);
        button.setAttribute("aria-pressed", String(active));
      });

      let newQuizLabel = `<svg aria-hidden="true" viewBox="0 0 24 24"><path d="M16 3h5v5"/><path d="M4 20l5.8-5.8"/><path d="M15 4l6 6"/><path d="M4 4l5.2 5.2"/><path d="M14.8 14.8L21 21"/><path d="M16 21h5v-5"/></svg>换一组`;
      if (state.mode === "mistakes") {
        newQuizLabel = `<svg aria-hidden="true" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v6h-6"/></svg>刷新错题`;
      } else if (state.mode === "en-zh") {
        newQuizLabel = `<svg aria-hidden="true" viewBox="0 0 24 24"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>换一组英译汉`;
      } else if (state.mode === "zh-en") {
        newQuizLabel = `<svg aria-hidden="true" viewBox="0 0 24 24"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>换一组汉译英`;
      }
      document.getElementById("new-quiz").innerHTML = newQuizLabel;
      document.getElementById("bottom-new-quiz").innerHTML = newQuizLabel;
    }

    function renderScore() {
      if (!state.submitted) {
        scorePanel.className = "score-panel";
        scorePanel.innerHTML = "";
        return;
      }

      const correct = state.quiz.filter(isCorrect).length;
      const unanswered = state.quiz.filter((question) => !isAnswered(question)).length;
      const percent = Math.round((correct / state.quiz.length) * 100);
      const wrong = state.quiz.length - correct;

      scorePanel.className = "score-panel is-visible";
      scorePanel.innerHTML = `
        <div>
          <div class="score-main">
            <span class="score-value">${correct}/${state.quiz.length}</span>
            <strong>${percent} 分</strong>
          </div>
          <p class="score-note">错题 ${wrong} 道，未答 ${unanswered} 道。页面已标出正确答案。</p>
        </div>
        <button class="button secondary" type="button" id="again-from-score" title="重新随机抽题">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v6h-6"/></svg>再来一组
        </button>
      `;
      document.getElementById("again-from-score").addEventListener("click", startQuiz);
    }

    function renderQuiz() {
      updateAnsweredCount();
      updateMistakeCount();
      setModeButtons();
      renderScore();

      const visibleQuestions = state.quiz.filter(questionShouldShow);
      if (!visibleQuestions.length) {
        const message = state.mode === "mistakes"
          ? "错题本还没有题目。先做一组随机练习，提交后错题会自动收进来。"
          : "当前筛选下没有题目。";
        quizForm.innerHTML = `<div class="empty-state">${message}</div>`;
        return;
      }

      quizForm.innerHTML = visibleQuestions.map((question) => renderQuestion(question)).join("");
    }

    function renderQuestion(question) {
      if (question.type === "term") {
        return renderTermQuestion(question);
      }

      const quizNumber = state.quiz.indexOf(question) + 1;
      const selected = getSelected(question.id);
      const mistakeEntry = getMistakeEntry(question.id);
      const mistakeBadge = mistakeEntry
        ? `<span class="mistake-badge">做错 ${wrongCountFor(mistakeEntry)} 次</span>`
        : "";
      const reviewedClass = state.submitted ? " is-reviewed" : "";
      const statusClass = state.submitted
        ? isCorrect(question)
          ? " is-correct"
          : isAnswered(question)
            ? " is-wrong"
            : " is-unanswered"
        : "";
      const inputType = question.answer_indices.length > 1 ? "checkbox" : "radio";
      const choiceMarkup = question.choices.map((choice, index) => {
        const checked = selected.includes(index) ? " checked" : "";
        const disabled = state.submitted ? " disabled" : "";
        const pickedWrong = state.submitted && selected.includes(index) && !question.answer_indices.includes(index);
        const missed = state.submitted && !selected.includes(index) && question.answer_indices.includes(index);
        const answer = state.submitted && question.answer_indices.includes(index);
        const classes = [
          "choice",
          selected.includes(index) ? "is-selected" : "",
          answer ? "is-answer" : "",
          pickedWrong ? "is-picked-wrong" : "",
          missed ? "is-missed" : ""
        ].filter(Boolean).join(" ");

        return `
          <label class="${classes}">
            <input type="${inputType}" name="${question.id}" value="${index}" data-question-id="${question.id}"${checked}${disabled}>
            <span><span class="choice-letter">${letters[index]}.</span>${escapeHtml(choice)}</span>
          </label>
        `;
      }).join("");

      return `
        <article class="question-card${statusClass}${reviewedClass}" data-question-id="${question.id}">
          <div class="question-head">
            <span class="question-no">${quizNumber}</span>
            <div>
              <h2 class="question-title">${escapeHtml(question.stem)}</h2>
              <div class="question-meta">${escapeHtml(question.unit || "Question Bank")}${mistakeBadge}</div>
            </div>
          </div>
          <div class="choices">${choiceMarkup}</div>
          <p class="answer-line"><strong>正确答案：</strong>${escapeHtml(answerText(question))}</p>
        </article>
      `;
    }

    function renderTermQuestion(question) {
      const quizNumber = state.quiz.indexOf(question) + 1;
      const typed = getTyped(question.id);
      const reviewedClass = state.submitted ? " is-reviewed" : "";
      const statusClass = state.submitted
        ? isCorrect(question)
          ? " is-correct"
          : isAnswered(question)
            ? " is-wrong"
            : " is-unanswered"
        : "";
      const inputClass = state.submitted
        ? isCorrect(question)
          ? " is-correct"
          : " is-wrong"
        : "";
      const disabled = state.submitted ? " disabled" : "";
      const modeLabel = question.direction === "en-zh" ? "英译汉" : "汉译英";
      const placeholder = question.direction === "en-zh" ? "输入中文译名" : "输入英文术语";

      return `
        <article class="question-card${statusClass}${reviewedClass}" data-question-id="${question.id}">
          <div class="question-head">
            <span class="question-no">${quizNumber}</span>
            <div>
              <h2 class="question-title">${escapeHtml(question.stem)}</h2>
              <div class="question-meta">${modeLabel} · 生态学专业术语</div>
            </div>
          </div>
          <div class="term-answer-box">
            <input class="translation-input${inputClass}" type="text" value="${escapeHtml(typed)}" data-term-id="${question.id}" placeholder="${placeholder}" autocomplete="off"${disabled}>
          </div>
          <p class="answer-line"><strong>正确答案：</strong>${escapeHtml(answerText(question))}</p>
        </article>
      `;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function handleChoiceChange(event) {
      const input = event.target;
      if (!input.matches("input[data-question-id]")) return;

      const questionId = input.dataset.questionId;
      const value = Number(input.value);
      const question = state.quiz.find((item) => item.id === questionId);
      if (!question) return;

      if (question.answer_indices.length > 1) {
        const current = new Set(getSelected(questionId));
        if (input.checked) {
          current.add(value);
        } else {
          current.delete(value);
        }
        state.selected[questionId] = [...current];
      } else {
        state.selected[questionId] = [value];
      }

      renderQuiz();
    }

    function handleTermInput(event) {
      const input = event.target;
      if (!input.matches("input[data-term-id]")) return;

      state.typed[input.dataset.termId] = input.value;
      updateAnsweredCount();
    }

    function submitQuiz() {
      state.submitted = true;
      if (!isTermMode()) {
        recordMistakes();
      }
      state.filter = "all";
      reviewFilter.value = "all";
      renderQuiz();
      const correct = state.quiz.filter(isCorrect).length;
      liveStatus.textContent = isTermMode()
        ? `已判分，答对 ${correct} 道。`
        : `已判分，答对 ${correct} 道。错题本已更新。`;
      scorePanel.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function resetAnswers() {
      state.selected = {};
      state.typed = {};
      state.submitted = false;
      state.filter = "all";
      reviewFilter.value = "all";
      renderQuiz();
      liveStatus.textContent = "当前选择已清空。";
    }

    function resetSession() {
      state.selected = {};
      state.typed = {};
      state.submitted = false;
      state.filter = "all";
      reviewFilter.value = "all";
    }

    function startPracticeQuiz() {
      state.mode = "practice";
      resetSession();
      state.quiz = shuffle(QUESTION_BANK).slice(0, QUIZ_SIZE);
      renderQuiz();
      liveStatus.textContent = "已随机抽取新题组。";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function startMistakeQuiz() {
      state.mode = "mistakes";
      resetSession();
      state.quiz = getMistakeQuestions().slice(0, QUIZ_SIZE);
      renderQuiz();
      liveStatus.textContent = state.quiz.length
        ? "已进入错题本练习。"
        : "错题本还没有题目。";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function startTermQuiz(direction) {
      state.mode = direction;
      resetSession();
      state.quiz = shuffle(TERM_BANK).slice(0, TERM_QUIZ_SIZE).map((term, index) => {
        const enToZh = direction === "en-zh";
        return {
          type: "term",
          id: `term-${direction}-${term.id}-${index}`,
          direction,
          stem: enToZh ? term.en : term.zh,
          answer: enToZh ? term.zh : term.en,
          termId: term.id
        };
      });
      renderQuiz();
      const modeLabel = direction === "en-zh" ? "英译汉" : "汉译英";
      liveStatus.textContent = `已随机抽取 ${TERM_QUIZ_SIZE} 道${modeLabel}术语题。`;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function startQuiz() {
      if (state.mode === "mistakes") {
        startMistakeQuiz();
        return;
      }
      if (isTermMode()) {
        startTermQuiz(state.mode);
        return;
      }
      startPracticeQuiz();
    }

    function clearMistakeBook() {
      state.mistakeBook = {};
      saveMistakeBook();
      state.mode = "practice";
      renderQuiz();
      startPracticeQuiz();
      liveStatus.textContent = "错题本已清空，并已切回随机练习。";
    }

    quizForm.addEventListener("change", handleChoiceChange);
    quizForm.addEventListener("input", handleTermInput);
    document.getElementById("new-quiz").addEventListener("click", startQuiz);
    document.getElementById("submit-quiz").addEventListener("click", submitQuiz);
    document.getElementById("reset-answers").addEventListener("click", resetAnswers);
    document.getElementById("bottom-new-quiz").addEventListener("click", startQuiz);
    document.getElementById("bottom-submit-quiz").addEventListener("click", submitQuiz);
    document.getElementById("bottom-reset-answers").addEventListener("click", resetAnswers);
    modePracticeButton.addEventListener("click", startPracticeQuiz);
    modeMistakesButton.addEventListener("click", startMistakeQuiz);
    modeEnZhButton.addEventListener("click", () => startTermQuiz("en-zh"));
    modeZhEnButton.addEventListener("click", () => startTermQuiz("zh-en"));
    clearMistakesButton.addEventListener("click", clearMistakeBook);
    reviewFilter.addEventListener("change", (event) => {
      state.filter = event.target.value;
      renderQuiz();
    });

    startQuiz();
  </script>
</body>
</html>
